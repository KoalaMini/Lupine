<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="'SF Mono', 'Menlo', monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#666"/></marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4A90D9"/></marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Lupine 狼王架构</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#888">主Agent + 四子Agent</text>

  <rect x="275" y="65" width="150" height="40" rx="20" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="350" y="90" text-anchor="middle" font-weight="bold" fill="#2E7D32"> 你</text>

  <line x1="350" y1="105" x2="350" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="175" y="142" width="350" height="70" rx="12" fill="#FFF3E0" stroke="#FF9800" stroke-width="2.5"/>
  <text x="350" y="167" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">Lupine（狼王）</text>
  <text x="350" y="185" text-anchor="middle" font-size="12" fill="#BF360C">产品经理 思考伙伴 Agent总管</text>
  <text x="350" y="200" text-anchor="middle" font-size="11" fill="#888">对话 探索 发散 收敛 决策 产出spec</text>

  <line x1="250" y1="212" x2="140" y2="260" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dash)"/>
  <line x1="350" y1="212" x2="350" y2="260" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dash)"/>
  <line x1="450" y1="212" x2="560" y2="260" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dash)"/>

  <text x="195" y="238" text-anchor="middle" font-size="10" fill="#4A90D9">task(探索...)</text>
  <text x="350" y="238" text-anchor="middle" font-size="10" fill="#4A90D9">task(规划...)</text>
  <text x="508" y="238" text-anchor="middle" font-size="10" fill="#4A90D9">task(执行...)</text>

  <rect x="50" y="265" width="180" height="90" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="140" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">探索器 Explorer</text>
  <text x="140" y="310" text-anchor="middle" font-size="11" fill="#555">代码库浏览</text>
  <text x="140" y="326" text-anchor="middle" font-size="11" fill="#555">Web搜索 竞品调研</text>
  <text x="140" y="342" text-anchor="middle" font-size="11" fill="#555">文档阅读</text>

  <rect x="260" y="265" width="180" height="90" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="350" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">规划器 Planner</text>
  <text x="350" y="310" text-anchor="middle" font-size="11" fill="#555">技术方案设计</text>
  <text x="350" y="326" text-anchor="middle" font-size="11" fill="#555">架构决策</text>
  <text x="350" y="342" text-anchor="middle" font-size="11" fill="#555">产出 plan 文档</text>

  <rect x="470" y="265" width="180" height="90" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="560" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">执行器 Executor</text>
  <text x="560" y="310" text-anchor="middle" font-size="11" fill="#555">拆task 写代码</text>
  <text x="560" y="326" text-anchor="middle" font-size="11" fill="#555">写测试</text>
  <text x="560" y="342" text-anchor="middle" font-size="11" fill="#555">产出 tasks 文档</text>

  <rect x="200" y="380" width="300" height="50" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="350" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">评估器 Evaluator</text>
  <text x="350" y="420" text-anchor="middle" font-size="11" fill="#555">plan审查  code审查  门禁控制</text>

  <line x1="350" y1="355" x2="350" y2="378" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dash)"/>
  <text x="368" y="370" text-anchor="start" font-size="10" fill="#4A90D9">task(审查...)</text>

  <rect x="10" y="450" width="680" height="40" rx="6" fill="#FFF8E1" stroke="#FFC107" stroke-width="0.5"/>
  <text x="350" y="467" text-anchor="middle" font-size="10" fill="#F57F17">同一会话：Lupine主Agent负责对话&amp;决策，子Agent负责具体任务，结果以摘要返回</text>
  <text x="350" y="482" text-anchor="middle" font-size="10" fill="#F57F17">用户只需跟Lupine对话，无需手动切换角色</text>
</svg>
