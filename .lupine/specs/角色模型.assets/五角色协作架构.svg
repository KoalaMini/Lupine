<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'SF Mono', 'Menlo', monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#666"/></marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4A90D9"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E53935"/></marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Lupine 五角色协作架构</text>
  <text x="400" y="45" text-anchor="middle" font-size="11" fill="#888">主Agent调度 + 子Agent分工 + 评估器门禁</text>

  <!-- 用户 -->
  <rect x="350" y="60" width="100" height="32" rx="16" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-weight="bold" fill="#2E7D32">你</text>

  <line x1="400" y1="92" x2="400" y2="115" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lupine 主Agent -->
  <rect x="250" y="118" width="300" height="55" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2.5"/>
  <text x="400" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Lupine（主Agent）</text>
  <text x="400" y="155" text-anchor="middle" font-size="11" fill="#BF360C">产品经理 · 调度决策 · 需求澄清 · 写specs</text>
  <text x="400" y="168" text-anchor="middle" font-size="10" fill="#888">产出物：PRODUCT.md + specs/</text>

  <!-- 调度箭头（虚线） -->
  <line x1="320" y1="173" x2="180" y2="220" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
  <line x1="370" y1="173" x2="310" y2="220" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
  <line x1="430" y1="173" x2="490" y2="220" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
  <line x1="480" y1="173" x2="620" y2="220" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>

  <text x="230" y="200" text-anchor="middle" font-size="9" fill="#4A90D9">调度</text>
  <text x="330" y="200" text-anchor="middle" font-size="9" fill="#4A90D9">调度</text>
  <text x="470" y="200" text-anchor="middle" font-size="9" fill="#4A90D9">调度</text>
  <text x="570" y="200" text-anchor="middle" font-size="9" fill="#4A90D9">调度</text>

  <!-- 四个子Agent -->
  <rect x="50" y="225" width="160" height="95" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="130" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">探索器 Explorer</text>
  <text x="130" y="265" text-anchor="middle" font-size="10" fill="#555">代码库探索 · Web搜索</text>
  <text x="130" y="280" text-anchor="middle" font-size="10" fill="#555">文档阅读（只读）</text>
  <text x="130" y="295" text-anchor="middle" font-size="10" fill="#888">产出物：情报摘要</text>
  <text x="130" y="310" text-anchor="middle" font-size="9" fill="#E53935" font-weight="bold">硬规则：禁止写入</text>

  <rect x="230" y="225" width="160" height="95" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="310" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">规划器 Planner</text>
  <text x="310" y="265" text-anchor="middle" font-size="10" fill="#555">基于spec写执行计划</text>
  <text x="310" y="280" text-anchor="middle" font-size="10" fill="#555">任务拆分 · 依赖关系</text>
  <text x="310" y="295" text-anchor="middle" font-size="10" fill="#888">产出物：plans/</text>
  <text x="310" y="310" text-anchor="middle" font-size="9" fill="#E53935" font-weight="bold">硬规则：只写plans/</text>

  <rect x="410" y="225" width="160" height="95" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="490" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">执行器 Executor</text>
  <text x="490" y="265" text-anchor="middle" font-size="10" fill="#555">按plan写代码</text>
  <text x="490" y="280" text-anchor="middle" font-size="10" fill="#555">写测试 · 自测提交</text>
  <text x="490" y="295" text-anchor="middle" font-size="10" fill="#888">产出物：code + tests</text>
  <text x="490" y="310" text-anchor="middle" font-size="9" fill="#E53935" font-weight="bold">约束：遵循coding.md</text>

  <rect x="590" y="225" width="160" height="95" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="670" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">评估器 Evaluator</text>
  <text x="670" y="265" text-anchor="middle" font-size="10" fill="#555">按约束审查plan+code</text>
  <text x="670" y="280" text-anchor="middle" font-size="10" fill="#555">门禁控制：通过/打回</text>
  <text x="670" y="295" text-anchor="middle" font-size="10" fill="#888">产出物：reviews/</text>
  <text x="670" y="310" text-anchor="middle" font-size="9" fill="#E53935" font-weight="bold">权力：有否决权</text>

  <!-- 审查箭头（从子Agent到评估器） -->
  <line x1="130" y1="320" x2="250" y2="400" stroke="#E53935" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <line x1="310" y1="320" x2="350" y2="400" stroke="#E53935" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <line x1="490" y1="320" x2="450" y2="400" stroke="#E53935" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <!-- 评估器框（横跨底部） -->
  <rect x="100" y="405" width="600" height="55" rx="10" fill="#FFEBEE" stroke="#E53935" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="400" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">评估器门禁审查</text>
  <text x="400" y="442" text-anchor="middle" font-size="10" fill="#555">plan审查 → 通过/打回 → code审查 → 通过/打回 → Lupine决定是否合并</text>
  <text x="400" y="455" text-anchor="middle" font-size="10" fill="#888">依据：evals.md + Agent prompt 内联约束</text>

  <!-- 打回箭头（红色虚线向上） -->
  <path d="M 280 405 Q 280 360 310 320" stroke="#E53935" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M 400 405 Q 400 360 400 320" stroke="#E53935" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-red)"/>
  <text x="260" y="365" text-anchor="middle" font-size="9" fill="#E53935">打回</text>
  <text x="380" y="365" text-anchor="middle" font-size="9" fill="#E53935">打回</text>

  <!-- 能力层说明 -->
  <rect x="50" y="480" width="700" height="55" rx="8" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="0.5"/>
  <text x="400" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">Agent 能力三层结构</text>
  <text x="400" y="515" text-anchor="middle" font-size="10" fill="#777">Layer 1: Prompt（系统提示词） → Layer 2: MCP/Skill（工具集） → Layer 3: Constraints（约束内联）</text>
  <text x="400" y="528" text-anchor="middle" font-size="9" fill="#999">约束直接内联在 Agent prompt 中，无需外部 YAML 文件</text>

  <!-- 底部说明 -->
  <rect x="50" y="550" width="700" height="40" rx="6" fill="#FFF8E1" stroke="#FFC107" stroke-width="0.5"/>
  <text x="400" y="568" text-anchor="middle" font-size="10" fill="#F57F17">用户只需跟Lupine对话，Lupine自主决策调度子Agent，评估器作为质量门禁</text>
  <text x="400" y="582" text-anchor="middle" font-size="10" fill="#F57F17">同一会话内完成：需求澄清 → 探索 → 规划 → 执行 → 审查 → 合并</text>
</svg>