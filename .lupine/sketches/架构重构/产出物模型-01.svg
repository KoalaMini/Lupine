<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <style>
    text { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 13px; fill: #333; }
    .title { font-size: 16px; font-weight: bold; fill: #222; }
    .tag { font-size: 11px; fill: #888; }
    .spec { fill: #FFF3E0; stroke: #FF9800; stroke-width: 2; rx: 10; ry: 10; }
    .plan { fill: #E3F2FD; stroke: #1976D2; stroke-width: 2; rx: 10; ry: 10; }
    .prod { fill: #F3E5F5; stroke: #9C27B0; stroke-width: 2; rx: 12; ry: 12; }
    .arrow { fill: none; stroke: #999; stroke-width: 1.5; marker-end: url(#arrow); }
    .dash-arrow { fill: none; stroke: #4A90D9; stroke-width: 1.5; stroke-dasharray: 6,4; marker-end: url(#arrow-blue); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#999"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#4A90D9"/></marker>
  </defs>

  <!-- PRODUCT.md -->
  <rect class="prod" x="300" y="20" width="200" height="50"/>
  <text x="400" y="50" text-anchor="middle" class="title">PRODUCT.md</text>
  <text x="400" y="65" text-anchor="middle" class="tag">产品总纲</text>

  <!-- specs 区域 -->
  <rect class="spec" x="60" y="110" width="300" height="200" rx="12"/>
  <text x="210" y="140" text-anchor="middle" font-weight="bold" fill="#E65100">specs/ — 需求规格</text>
  <text x="210" y="158" text-anchor="middle" class="tag">给人读 | 长期存档 | WHAT + WHY</text>
  <line x1="90" y1="170" x2="330" y2="170" stroke="#FFE0B2" stroke-width="1"/>
  <text x="90" y="195" fill="#555">├── 用户系统/</text>
  <text x="100" y="218" fill="#888">│   ├── v1.0-用户登录.md</text>
  <text x="100" y="238" fill="#888">│   └── v1.1-用户登录.md</text>
  <text x="90" y="265" fill="#555">└── 支付模块/</text>
  <text x="100" y="288" fill="#888">    └── v1.0-支付流程.md</text>

  <!-- plans 区域 -->
  <rect class="plan" x="440" y="110" width="300" height="200" rx="12"/>
  <text x="590" y="140" text-anchor="middle" font-weight="bold" fill="#0D47A1">plans/ — 执行计划</text>
  <text x="590" y="158" text-anchor="middle" class="tag">给AI执行 | 只读 | HOW + 步骤</text>
  <line x1="470" y1="170" x2="710" y2="170" stroke="#BBDEFB" stroke-width="1"/>
  <text x="470" y="195" fill="#555">├── 实现用户登录.md</text>
  <text x="470" y="218" fill="#888">│   (ref: specs/用户系统/v1.0)</text>
  <text x="470" y="248" fill="#555">├── 优化支付交互.md</text>
  <text x="470" y="268" fill="#888">│   (ref: specs/支付模块/v1.0)</text>
  <text x="470" y="298" fill="#555">└── 修复支付回调Bug.md</text>

  <!-- 连线 -->
  <path class="arrow" d="M400,70 L400,100 L210,100 L210,110"/>
  <text x="260" y="95" class="tag" fill="#999">从需求来</text>
  <path class="arrow" d="M400,70 L400,100 L590,100 L590,110"/>
  <text x="490" y="95" class="tag" fill="#999">从任务来</text>

  <!-- 中间说明 -->
  <path class="dash-arrow" d="M360,210 C390,210 410,210 440,210"/>
  <text x="400" y="200" text-anchor="middle" font-size="11" fill="#4A90D9">可引用·可更新</text>

  <!-- 底部对照 -->
  <rect x="150" y="350" width="500" height="140" rx="8" fill="#FAFAFA" stroke="#DDD"/>
  <text x="400" y="375" text-anchor="middle" font-weight="bold" fill="#333">并行文档模型</text>
  <text x="170" y="402" font-size="12" fill="#555">场景1（产品需求）→ Lupine 写 spec → Planner 写 plan → Executor 执行</text>
  <text x="170" y="422" font-size="12" fill="#555">场景3（交互优化）→ Planner 直接写 plan → 涉及既有 spec 时同步更新</text>
  <text x="170" y="442" font-size="12" fill="#555">场景4（修 Bug）→ Planner 写 plan → Executor 执行 → 视情况补 spec</text>
  <text x="170" y="465" font-size="12" fill="#555">文档版本号独立：v1.0 → v1.1（不绑定产品版本）</text>
</svg>
