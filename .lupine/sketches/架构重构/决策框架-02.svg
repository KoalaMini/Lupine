<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560">
  <style>
    text { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 12px; fill: #333; }
    .title { font-size: 14px; font-weight: bold; fill: #222; }
    .tag { font-size: 11px; fill: #777; }
    .user-box { fill: #E8F5E9; stroke: #4CAF50; stroke-width: 2; rx: 20; ry: 20; }
    .lupine-box { fill: #FFF3E0; stroke: #FF9800; stroke-width: 2; rx: 12; ry: 12; }
    .sub-box { fill: #E3F2FD; stroke: #1976D2; stroke-width: 2; rx: 10; ry: 10; }
    .eval-box { fill: #F3E5F5; stroke: #9C27B0; stroke-width: 2; rx: 10; ry: 10; }
    .arrow { fill: none; stroke: #666; stroke-width: 1.5; marker-end: url(#arrow); }
    .dash { fill: none; stroke: #4A90D9; stroke-width: 1.5; stroke-dasharray: 5,3; marker-end: url(#arrow-blue); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#666"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#4A90D9"/></marker>
  </defs>

  <!-- 用户输入 -->
  <rect class="user-box" x="250" y="10" width="200" height="36"/>
  <text x="350" y="33" text-anchor="middle" font-weight="bold">用户输入请求</text>

  <!-- Lupine 决策 -->
  <rect class="lupine-box" x="225" y="65" width="250" height="40"/>
  <text x="350" y="80" text-anchor="middle" class="title">Lupine 调度器</text>
  <text x="350" y="95" text-anchor="middle" class="tag">分类 → 判定产出物 → 调度子Agent</text>

  <!-- 箭头下行 -->
  <path class="arrow" d="M350,46 L350,55 L350,65"/>

  <!-- 四类场景 -->
  <rect class="sub-box" x="30" y="125" width="140" height="32"/>
  <text x="100" y="145" text-anchor="middle" font-size="11">1 产品需求</text>
  <rect class="sub-box" x="190" y="125" width="140" height="32"/>
  <text x="260" y="145" text-anchor="middle" font-size="11">2 模糊需求</text>
  <rect class="sub-box" x="350" y="125" width="140" height="32"/>
  <text x="420" y="145" text-anchor="middle" font-size="11">3 交互优化</text>
  <rect class="sub-box" x="510" y="125" width="140" height="32"/>
  <text x="580" y="145" text-anchor="middle" font-size="11">4 修复Bug</text>

  <path class="dash" d="M350,105 L350,115 L100,115 L100,125"/>
  <path class="dash" d="M350,105 L350,115 L260,115 L260,125"/>
  <path class="dash" d="M350,105 L350,115 L420,115 L420,125"/>
  <path class="dash" d="M350,105 L350,115 L580,115 L580,125"/>

  <!-- 可选预研 -->
  <rect x="30" y="180" width="140" height="28" rx="6" fill="#FFF" stroke="#DDD"/>
  <text x="100" y="198" text-anchor="middle" font-size="10">→ 对话探讨写 spec</text>
  <rect x="190" y="180" width="140" height="28" rx="6" fill="#FFF" stroke="#DDD"/>
  <text x="260" y="198" text-anchor="middle" font-size="10">→ Explorer 调研</text>
  <rect x="350" y="180" width="140" height="28" rx="6" fill="#FFF" stroke="#DDD"/>
  <text x="420" y="198" text-anchor="middle" font-size="10">→ 直接派 Planner</text>
  <rect x="510" y="180" width="140" height="28" rx="6" fill="#FFF" stroke="#DDD"/>
  <text x="580" y="198" text-anchor="middle" font-size="10">→ 复现后派 Planner</text>

  <!-- 汇聚到子Agent -->
  <rect class="sub-box" x="30" y="240" width="145" height="28"/>
  <text x="102" y="258" text-anchor="middle" font-size="11">Planner 写 plan</text>
  <rect class="sub-box" x="200" y="240" width="145" height="28"/>
  <text x="272" y="258" text-anchor="middle" font-size="11">Executor 写代码</text>
  <rect class="eval-box" x="370" y="240" width="145" height="28"/>
  <text x="442" y="258" text-anchor="middle" font-size="11">Evaluator 审查</text>
  <rect class="sub-box" x="540" y="240" width="145" height="28"/>
  <text x="612" y="258" text-anchor="middle" font-size="11">[循环] 打回重做</text>

  <!-- 下行箭头 -->
  <path class="arrow" d="M100,208 L100,228 L100,240"/>
  <path class="arrow" d="M260,208 L260,228 L272,240"/>
  <path class="arrow" d="M420,208 L420,228 L442,240"/>
  <path class="arrow" d="M580,208 L580,228 L612,240"/>

  <!-- 流转举例 -->
  <rect x="80" y="300" width="540" height="90" rx="8" fill="#FAFAFA" stroke="#DDD"/>
  <text x="350" y="323" text-anchor="middle" font-weight="bold" fill="#333">注意：上面流程是 Lupine 的"典型决策"，非硬编码路径</text>
  <text x="100" y="347" font-size="11" fill="#555">• Planner 写 plan → Evaluator 审 plan → (通过 → Executor 执行)</text>
  <text x="100" y="365" font-size="11" fill="#555">• (不通过 → 回 Planner 改 plan → 再审)</text>
  <text x="100" y="383" font-size="11" fill="#555">• Lupine 可在任何节点介入（需求变更、紧急打断、重估方向）</text>

  <!-- 微小区分 -->
  <rect x="200" y="420" width="300" height="28" rx="14" fill="#FFF8E1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="350" y="438" text-anchor="middle" font-size="11" fill="#E65100">微小改动 / 紧急修复 → 可跳过部分步骤</text>
</svg>
