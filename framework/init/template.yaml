version: 1.0

placeholders:
  name: "{project_name}"

profiles:
  peer:
    entry_dir: "./"
    lupine_dir: ".lupine/"
    desc: "Lupine 与 frontend/ backend/ 平级"
  embedded:
    entry_dir: "./"
    lupine_dir: "./"
    desc: "Lupine 嵌入项目内部"

entries:
  - path: CLAUDE.md
    template: CLAUDE.md
    target: "{profile.entry_dir}"
    mode: additive
  - path: PRODUCT.md
    template: PRODUCT.md
    target: "{profile.lupine_dir}"
  - path: README.md
    template: README.md
    target: "{profile.lupine_dir}"
  - path: .gitignore
    template: gitignore
    target: "{profile.lupine_dir}"
  - path: rules/agents.md
    template: rules/agents.md
    target: "{profile.lupine_dir}"
  - path: rules/coding.md
    template: rules/coding.md
    target: "{profile.lupine_dir}"
  - path: rules/evals.md
    template: rules/evals.md
    target: "{profile.lupine_dir}"
  - path: rules/git.md
    template: rules/git.md
    target: "{profile.lupine_dir}"
  - path: reqs/
    type: empty-dir
    target: "{profile.lupine_dir}"
  - path: plans/
    type: empty-dir
    target: "{profile.lupine_dir}"
  - path: reviews/
    type: empty-dir
    target: "{profile.lupine_dir}"
  - path: tasks/
    type: empty-dir
    target: "{profile.lupine_dir}"
  - path: ".opencode/agents/lupine.md"
    generate: agent
    agent: lupine
    platform: opencode
    target: "{profile.entry_dir}"
  - path: ".opencode/agents/lupine-planner.md"
    generate: agent
    agent: lupine-planner
    platform: opencode
    target: "{profile.entry_dir}"
  - path: ".opencode/agents/lupine-executor.md"
    generate: agent
    agent: lupine-executor
    platform: opencode
    target: "{profile.entry_dir}"
  - path: ".opencode/agents/lupine-evaluator.md"
    generate: agent
    agent: lupine-evaluator
    platform: opencode
    target: "{profile.entry_dir}"
  - path: ".claude/agents/lupine.md"
    generate: agent
    agent: lupine
    platform: claude
    target: "{profile.entry_dir}"
  - path: ".claude/agents/lupine-planner.md"
    generate: agent
    agent: lupine-planner
    platform: claude
    target: "{profile.entry_dir}"
  - path: ".claude/agents/lupine-executor.md"
    generate: agent
    agent: lupine-executor
    platform: claude
    target: "{profile.entry_dir}"
  - path: ".claude/agents/lupine-evaluator.md"
    generate: agent
    agent: lupine-evaluator
    platform: claude
    target: "{profile.entry_dir}"

agents:
  lupine:
    description: Lupine 主Agent，产品经理，协调子Agent、决策产出
    prompt: agents/lupine.prompt
    opencode:
      mode: primary
      permission:
        edit: allow
        bash:
          "*": ask
          "git *": allow
    claude:
      name: lupine
      tools: "Read, Write, Edit, Glob, Grep, Bash"
      model: sonnet
  lupine-planner:
    description: Lupine 规划器，负责基于已确认的需求规格说明书做技术设计
    prompt: agents/lupine-planner.prompt
    opencode:
      mode: subagent
      permission:
        edit: deny
        bash:
          "*": ask
          "ls *": allow
    claude:
      name: lupine-planner
      tools: "Read, Write, Edit, Glob, Grep"
      disallowedTools: "Bash"
      model: sonnet
  lupine-executor:
    description: Lupine 执行器，负责拆 task、写代码、写测试
    prompt: agents/lupine-executor.prompt
    opencode:
      mode: subagent
      permission:
        edit: allow
        bash:
          "*": ask
    claude:
      name: lupine-executor
      tools: "Read, Write, Edit, Glob, Grep, Bash"
      model: sonnet
  lupine-evaluator:
    description: Lupine 评估器，负责代码审查、设计审查、门禁检查
    prompt: agents/lupine-evaluator.prompt
    opencode:
      mode: subagent
      temperature: 0.1
      permission:
        edit: deny
        bash:
          "*": ask
          "grep *": allow
          "git *": allow
    claude:
      name: lupine-evaluator
      tools: "Read, Glob, Grep, Bash(git *, grep *)"
      disallowedTools: "Write, Edit"
      model: sonnet
